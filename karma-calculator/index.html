<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma Calculator</title>
    <style>
        :root {
            --primary: #5d5fef;
            --dark: #1a1a1a;
            --bg: #f4f4f9;
            --surface: #ffffff;
            --accent: #ffde59;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: var(--surface);
            border: 4px solid var(--dark);
            box-shadow: 10px 10px 0 var(--dark);
            padding: 28px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        p { margin-top: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--dark);
            font-size: 1rem;
        }

        button {
            margin-top: 18px;
            border: 3px solid var(--dark);
            background: var(--accent);
            color: var(--dark);
            padding: 12px 16px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            border: 3px solid var(--dark);
            padding: 14px;
            background: #fff;
        }

        .result strong {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .small-link {
            margin-top: 20px;
            display: inline-block;
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Karma Calculator</h1>
        <p>Estimate your karma score from your recent actions.</p>

        <div class="grid">
            <div>
                <label for="kindActs">Kind acts</label>
                <input id="kindActs" type="number" min="0" value="0">
            </div>
            <div>
                <label for="helpHours">Hours helping others</label>
                <input id="helpHours" type="number" min="0" step="0.5" value="0">
            </div>
            <div>
                <label for="harmfulActs">Harmful acts</label>
                <input id="harmfulActs" type="number" min="0" value="0">
            </div>
            <div>
                <label for="liesTold">Lies told</label>
                <input id="liesTold" type="number" min="0" value="0">
            </div>
        </div>

        <button id="calculateBtn" type="button">Calculate Karma</button>

        <section class="result" aria-live="polite">
            <div>Your karma score: <strong id="karmaScore">0</strong></div>
            <div id="karmaMessage">Balanced. Keep going.</div>
        </section>

        <a class="small-link" href="../">← Back to main page</a>
    </main>

    <script>
        (function () {
            const inputs = {
                kindActs: document.getElementById('kindActs'),
                helpHours: document.getElementById('helpHours'),
                harmfulActs: document.getElementById('harmfulActs'),
                liesTold: document.getElementById('liesTold')
            };

            const scoreEl = document.getElementById('karmaScore');
            const messageEl = document.getElementById('karmaMessage');
            const calculateBtn = document.getElementById('calculateBtn');

            function asNumber(value) {
                const parsed = Number(value);
                if (!Number.isFinite(parsed) || parsed < 0) {
                    return 0;
                }
                return parsed;
            }

            function getMessage(score) {
                if (score >= 80) return 'Excellent karma. Keep spreading kindness!';
                if (score >= 40) return 'Good karma. You are trending positive.';
                if (score >= 0) return 'Balanced. Keep going.';
                if (score >= -40) return 'Needs attention. Small positive acts can help.';
                return 'Critical karma debt. Time for restorative action.';
            }

            function calculate() {
                const kindActs = asNumber(inputs.kindActs.value);
                const helpHours = asNumber(inputs.helpHours.value);
                const harmfulActs = asNumber(inputs.harmfulActs.value);
                const liesTold = asNumber(inputs.liesTold.value);

                const score = Math.round((kindActs * 10) + (helpHours * 8) - (harmfulActs * 12) - (liesTold * 6));

                scoreEl.textContent = String(score);
                messageEl.textContent = getMessage(score);
            }

            calculateBtn.addEventListener('click', calculate);
            Object.values(inputs).forEach((input) => {
                input.addEventListener('input', calculate);
            });

            calculate();
        })();
    </script>
</body>
</html>
